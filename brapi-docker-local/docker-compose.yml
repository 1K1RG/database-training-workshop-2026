services:
  brapi-server:
    build: ./server
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/brapi/v2/serverinfo"]
      interval: 15s
      timeout: 5s
      retries: 3
